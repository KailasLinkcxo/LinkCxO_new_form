<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TR Mapping — Card View</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f6f2;--surface:#fff;--surface2:#f0ede6;--ink:#1a1a18;--ink-mid:#4a4a44;--ink-dim:#9a9a90;--rule:rgba(26,26,24,0.11);--rule2:rgba(26,26,24,0.06);--green:#1d7a58;--green-d:#0f4f38;--green-dim:rgba(29,122,88,0.09);--blue:#1a4a8a;--blue-dim:rgba(26,74,138,0.09);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);}
.topbar{height:58px;background:var(--surface);border-bottom:2.5px solid var(--green);display:flex;align-items:center;padding:0 32px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.06);}
.logo{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}.logo span{color:var(--green);}
.tb-div{width:1px;height:22px;background:var(--rule);}
.tb-title{font-size:12px;font-weight:500;color:var(--ink-mid);flex:1;}
.tb-badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 10px;background:var(--green-dim);border:1px solid rgba(29,122,88,0.2);border-radius:20px;color:var(--green-d);}
.tb-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-dim);}.tb-count strong{color:var(--green);}
.fbar{padding:12px 32px;background:var(--surface);border-bottom:1px solid var(--rule2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sw{position:relative;min-width:200px;flex:1;max-width:300px;}
.sw input{width:100%;background:var(--bg);border:1.5px solid var(--rule);border-radius:8px;padding:8px 12px 8px 32px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color 0.2s;}
.sw input:focus{border-color:var(--green);}.sw input::placeholder{color:var(--ink-dim);}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-dim);font-size:14px;}
.fb{background:var(--surface);border:1.5px solid var(--rule);border-radius:8px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink-mid);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.fb:hover{border-color:var(--green);color:var(--green);background:var(--green-dim);}
.fb.active{background:var(--green);border-color:var(--green);color:#fff;}
.sort-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.sort-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-dim);letter-spacing:0.08em;text-transform:uppercase;}
.sort-sel{background:var(--surface);border:1.5px solid var(--rule);border-radius:8px;padding:7px 28px 7px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239a9a90' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;}
.main{padding:28px 32px 60px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;}
.card{background:var(--surface);border:1.5px solid var(--rule2);border-radius:16px;padding:22px;position:relative;overflow:hidden;transition:box-shadow 0.2s,transform 0.15s,border-color 0.15s;animation:fu 0.4s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card:hover{box-shadow:0 10px 32px rgba(0,0,0,0.09);transform:translateY(-3px);border-color:rgba(29,122,88,0.25);}
.card-accent{position:absolute;top:0;left:0;right:0;height:3.5px;}
.ch{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.av{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;flex-shrink:0;}
.cn{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--ink);line-height:1.2;}
.cc{font-size:12px;font-weight:500;color:var(--green);margin-top:3px;}
.ct{font-size:10.5px;color:var(--ink-mid);margin-top:2px;line-height:1.4;font-style:italic;}
.lin{margin-left:auto;flex-shrink:0;width:30px;height:30px;border-radius:7px;background:var(--blue-dim);border:1px solid rgba(26,74,138,0.18);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;text-decoration:none;transition:background 0.15s;}
.lin:hover{background:rgba(26,74,138,0.2);}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.chip{font-size:10px;font-family:'DM Mono',monospace;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.chip.city{background:var(--green-dim);color:var(--green-d);border:1px solid rgba(29,122,88,0.15);}
.chip.yoe{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(26,74,138,0.18);}
.chip.geo{background:#f0ede6;color:var(--ink-mid);border:1px solid rgba(26,26,24,0.10);}
.divr{height:1px;background:var(--rule2);margin-bottom:12px;}
.crit-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.crit{display:flex;align-items:flex-start;gap:7px;background:var(--bg);border-radius:7px;padding:7px 9px;border:1px solid var(--rule2);}
.crit-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:3px;}
.crit-inner{flex:1;min-width:0;}
.crit-lbl{font-size:10px;color:var(--ink-mid);line-height:1.3;font-weight:500;}
.crit-val{font-family:'DM Mono',monospace;font-size:9px;color:var(--green);font-weight:600;margin-top:1px;}
.edu{font-size:11px;color:var(--ink-dim);display:flex;align-items:flex-start;gap:5px;margin-bottom:10px;line-height:1.4;}
.prev{display:flex;flex-wrap:wrap;gap:4px;}
.ptag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surface2);border:1px solid var(--rule2);color:var(--ink-mid);}
.no-res{text-align:center;padding:80px 20px;color:var(--ink-dim);font-family:'DM Mono',monospace;font-size:12px;}
.hidden{display:none!important;}
.footer{padding:16px 32px;border-top:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-dim);background:var(--surface);}
.flogo{font-weight:500;color:var(--ink-mid);text-transform:uppercase;letter-spacing:0.12em;}.flogo span{color:var(--green);}
@media(max-width:680px){.topbar,.fbar,.main,.footer{padding-left:16px;padding-right:16px;}.tb-title,.tb-div,.tb-badge{display:none;}.grid{grid-template-columns:1fr;}.sort-wrap{display:none;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Leaders'<span>Edge</span></div>
  <div class="tb-div"></div>
  <div class="tb-title">Head of Total Rewards — Talent Mapping</div>
  <div class="tb-badge">CONFIDENTIAL</div>
  <div class="tb-count"><strong id="rc">16</strong> of 16 candidates</div>
</div>
<div class="fbar">
  <div class="sw"><span class="si">⌕</span><input type="text" id="search" placeholder="Search name, company, city, previous employer…"></div>
  <button class="fb active" onclick="fCity('all',this)">All Cities</button>
  <button class="fb" onclick="fCity('Mumbai',this)">Mumbai</button>
  <button class="fb" onclick="fCity('Bangalore',this)">Bangalore</button>
  <button class="fb" onclick="fCity('New Delhi',this)">Delhi</button>
  <button class="fb" onclick="fCity('other',this)">Other</button>
  <div class="sort-wrap">
    <span class="sort-lbl">Sort</span>
    <select class="sort-sel" id="sort" onchange="render()">
      <option value="default">Default</option>
      <option value="yoe-desc">Experience ↓</option>
      <option value="yoe-asc">Experience ↑</option>
      <option value="name">Name A–Z</option>
    </select>
  </div>
</div>
<div class="main">
  <div class="grid" id="grid"></div>
  <div class="no-res hidden" id="nores">No candidates match your filters.</div>
</div>
<footer class="footer">
  <div class="flogo">Leaders'<span>Edge</span></div>
  <div>Strictly Confidential · For Internal Use Only</div>
  <div id="fdate"></div>
</footer>
<script>
const C=[
  {id:1,name:"Sanjay Gawde",company:"Mahindra Logistics",title:"CHRO",yoe:22,city:"Mumbai",geo:"Global and India",edu:"MMS from University of Mumbai - 2002",prev:["Lupin","John Deere"],crit:[{l:"Reward Strategy",v:"Yes, more than 15 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/sanjay-gawde-1851888/"},
  {id:2,name:"Mohammad Tasneem",company:"Deutsche Bank",title:"Head of Rewards, India",yoe:27,city:"Mumbai",geo:"Global and India",edu:"PGDM from IILM - 1999",prev:["Goldman Sachs","Novartis","Capgemini","HCL","Artech","Herosoft"],crit:[{l:"Reward Strategy",v:"Yes, more than 18 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/mohammad-tasneem-785a343/"},
  {id:3,name:"Rupam Singh",company:"JSW Steel",title:"Head of Human Resources",yoe:17,city:"Mumbai",geo:"Global and India",edu:"MBA from Delhi School of Economics - 2010",prev:["Schindler","Cipla","IBM"],crit:[{l:"Reward Strategy",v:"Yes, more than 15 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/rupam-singh-73a811b/"},
  {id:4,name:"Sanjay Singh",company:"Aditya Birla Capital",title:"EVP and Head - Compensation & Benefits",yoe:29,city:"Mumbai",geo:"Global and India",edu:"PGDM from Institute of Engineering and Rural Technology - 1996",prev:["Aditya Birla Group","Loreal"],crit:[{l:"Reward Strategy",v:"Yes, more than 20 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/sanjay-singh-8047837/"},
  {id:5,name:"Blesson Jacob",company:"Barclays",title:"APAC Head of Reward",yoe:26,city:"Mumbai",geo:"Global and India",edu:"MBA from Symbiosis Center for Management & HRD - 2003",prev:["Citi Bank","GE Capital"],crit:[{l:"Reward Strategy",v:"Yes, more than 23 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/blessonjacob/"},
  {id:6,name:"Radhika Singh Banerjee",company:"Tata Steel",title:"Chief Talent Management & Employee Experience",yoe:27,city:"Jamshedpur",geo:"Global and India",edu:"MS from The London School of Economics and Political Science (LSE) - 2000",prev:["GE","EXL","Hewitt Associates"],crit:[{l:"Reward Strategy",v:"Yes, more than 25 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/radhikasinghbanerjee/"},
  {id:7,name:"Suresh Babu",company:"Hero MotoCorp",title:"Head - Total Rewards & HR Automation",yoe:28,city:"New Delhi",geo:"Global and India",edu:"MBA - HR from Institute of Management Technology, Ghaziabad",prev:["BASF","General Motors"],crit:[{l:"Reward Strategy",v:"Yes, more than 20 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/suresh-babu-70072017/"},
  {id:8,name:"Ritu Dubey",company:"Mahindra Group",title:"Head - Total Rewards",yoe:19,city:"Mumbai",geo:"Global and India",edu:"MBA - HR from International School of Business & Media - 2005",prev:["Glenmark Pharma","Citi Bank","ICICI","Accenture"],crit:[{l:"Reward Strategy",v:"Yes, more than 10 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/ritu-dubey-910080a/"},
  {id:9,name:"Ankita Subba",company:"Vedanta",title:"Group Head - Performance & Total Rewards",yoe:23,city:"Gurugram",geo:"Global and India",edu:"MBA - HR from Faculty of Management Studies, CMM, Jabalpur - 2003",prev:["IBM Daksh","Max Healthcare"],crit:[{l:"Reward Strategy",v:"Yes, more than 15 yrs"},{l:"HR Technology",v:"Yes (SAP, Darwin Box & Oracle)"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/ankita-subba-b2b44012/"},
  {id:10,name:"Prasanna Kumar Reddy C",company:"HP",title:"Head of Total Rewards, India",yoe:26,city:"Bangalore",geo:"Global and India",edu:"PGCHRM from XLRI Jamshedpur - 2015",prev:["Tata Technologies","Perot Systems","Accenture","Hewitt"],crit:[{l:"Reward Strategy",v:"Yes, more than 20 yrs"},{l:"HR Technology",v:"Yes (SAP)"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/prasanna-kumar-reddy-c-236b678/"},
  {id:11,name:"Gaurav Mahajan",company:"L'Oréal",title:"Head - Total Rewards",yoe:17,city:"Mumbai",geo:"Global and India",edu:"MBA - HR from Delhi School of Economics - 2008",prev:["Kotak","ICICI"],crit:[{l:"Reward Strategy",v:"Yes, 8 yrs"},{l:"HR Technology",v:"Yes (HRIS)"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/gaurav-mahajan-5248b511/"},
  {id:12,name:"Rajiv Purohit",company:"IKEA",title:"Country Head - Total Rewards, Payroll & Mobility",yoe:17,city:"Bangalore",geo:"Global and India",edu:"PGDM from XLRI Jamshedpur - 2012",prev:["JSW","Britannia","Reliance"],crit:[{l:"Reward Strategy",v:"Yes, 7 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/rajiv-purohit-a8722134/"},
  {id:13,name:"Deepika Maskara",company:"Piramal Pharma",title:"Global Head - Total Rewards and Corporate HR Head",yoe:19,city:"Mumbai",geo:"Global and India",edu:"MBA from Symbiosis",prev:["IDFC Bank","Mercer","Genpact","TCS"],crit:[{l:"Reward Strategy",v:"Yes, 15 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/deepika-maskara/"},
  {id:14,name:"Praveen Gandhi",company:"Tata Technologies",title:"Global Head & Vice President – Performance & Rewards, Mobility and GSD",yoe:21,city:"Pune",geo:"Global and India",edu:"MBA from Singapore Management University - 2011",prev:["Kalyani Group","RPG Group","Zensar","Birlasoft","Mercer"],crit:[{l:"Reward Strategy",v:"Yes, 21 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/praveengandhi-tr-boardcomp-genai-gphr/"},
  {id:15,name:"Balaji Subbaraman",company:"Bosch",title:"Head - Total Rewards, HR Analytics & Digitalisation",yoe:26,city:"Bangalore",geo:"Global and India",edu:"MMS from University of Mumbai - 2000",prev:["Coffe Day Beverages","Phillips","ICICI","TCS"],crit:[{l:"Reward Strategy",v:"Yes, more than 20 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/balajisubbaraman/"},
  {id:16,name:"Sumit Katyal",company:"Biocon",title:"AVP HR - Global Head (Total Rewards)",yoe:27,city:"Bangalore",geo:"Global and India",edu:"MBA from Symbiosis - 2004",prev:["GE","Ingersoll Rand","PwC","Hewitt Associates","Vedanta"],crit:[{l:"Reward Strategy",v:"Yes, more than 20 yrs"},{l:"HR Technology",v:"Yes"},{l:"Global Mobility",v:"Yes"},{l:"Cross Functional Team Mgmt",v:"Yes"}],li:"https://www.linkedin.com/in/sumit-katyal-29baa32/"},
];
const BG=['#d4ece2','#dce8f8','#f8e8dc','#ede0f5','#d4ece2','#f5e0e8','#dce8f8','#d4ece2','#f8f0dc','#dce8f8','#e8f0d4','#f5e0e8','#f8e8dc','#d4ece2','#dce8f8','#f8f0dc'];
const TX=['#0f4f38','#1a4a8a','#8a4000','#5a1a8a','#0f4f38','#8a0030','#1a4a8a','#0f4f38','#7a5a00','#1a4a8a','#3a6a00','#8a0030','#8a4000','#0f4f38','#1a4a8a','#7a5a00'];
const ACC=['#1d7a58','#1a4a8a','#c96a10','#6b3fa0','#1d7a58','#c0284e','#1a4a8a','#1d7a58','#b8963c','#1a4a8a','#4a7a20','#c0284e','#c96a10','#1d7a58','#1a4a8a','#b8963c'];
function ini(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('');}
let curCity='all',curQ='';
function getData(){
  let d=[...C];
  if(curCity==='other') d=d.filter(c=>!['Mumbai','Bangalore','New Delhi'].includes(c.city));
  else if(curCity!=='all') d=d.filter(c=>c.city===curCity);
  if(curQ) d=d.filter(c=>c.name.toLowerCase().includes(curQ)||c.company.toLowerCase().includes(curQ)||c.city.toLowerCase().includes(curQ)||c.prev.some(p=>p.toLowerCase().includes(curQ))||c.title.toLowerCase().includes(curQ));
  const s=document.getElementById('sort').value;
  if(s==='yoe-desc') d.sort((a,b)=>b.yoe-a.yoe);
  else if(s==='yoe-asc') d.sort((a,b)=>a.yoe-b.yoe);
  else if(s==='name') d.sort((a,b)=>a.name.localeCompare(b.name));
  return d;
}
function render(){
  const d=getData();
  document.getElementById('rc').textContent=d.length;
  const g=document.getElementById('grid'),nr=document.getElementById('nores');
  if(!d.length){g.innerHTML='';nr.classList.remove('hidden');return;}
  nr.classList.add('hidden');
  g.innerHTML=d.map((c,i)=>`
    <div class="card" style="animation-delay:${i*35}ms">
      <div class="card-accent" style="background:${ACC[c.id-1]}"></div>
      <div class="ch">
        <div class="av" style="background:${BG[c.id-1]};color:${TX[c.id-1]}">${ini(c.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="cn">${c.name}</div>
          <div class="cc">${c.company}</div>
          <div class="ct">${c.title}</div>
        </div>
        <a class="lin" href="${c.li}" target="_blank" rel="noopener">in</a>
      </div>
      <div class="chips">
        <span class="chip city">📍 ${c.city}</span>
        <span class="chip yoe">${c.yoe} yrs exp.</span>
        <span class="chip geo">🌐 ${c.geo}</span>
      </div>
      <div class="divr"></div>
      <div class="crit-grid">
        ${c.crit.map(cr=>`<div class="crit"><div class="crit-dot"></div><div class="crit-inner"><div class="crit-lbl">${cr.l}</div><div class="crit-val">${cr.v}</div></div></div>`).join('')}
      </div>
      <div class="edu">🎓 ${c.edu}</div>
      <div class="divr"></div>
      <div class="prev">${c.prev.map(p=>`<span class="ptag">${p}</span>`).join('')}</div>
    </div>`).join('');
}
function fCity(city,el){curCity=city;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
document.getElementById('search').addEventListener('input',e=>{curQ=e.target.value.toLowerCase();render();});
document.getElementById('fdate').textContent=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
render();
</script></body></html>
